services:
  - type: web
    name: ai-document-intelligence
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        value: "sqlite:///./dev.db"
      - key: UPLOAD_DIR
        value: "uploads"
      - key: LLM_PROVIDER
        value: "none"
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
